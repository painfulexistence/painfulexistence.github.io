<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect — sends unknown paths back to index.html
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
      '/?/' + l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash
    );
  </script>
</head>
</html>
